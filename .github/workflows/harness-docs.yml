name: Harness Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout harness skills
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.HARNESS_SKILLS_REPOSITORY }}
          ref: ${{ vars.HARNESS_SKILLS_REF }}
          path: .skills/harness
          token: ${{ secrets.HARNESS_SKILLS_REPO_TOKEN || github.token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs-harness runtime
        working-directory: .skills/harness/skills/docs-harness
        run: uv sync

      - name: Harness docs check
        working-directory: .skills/harness/skills/docs-harness
        run: uv run python scripts/harness/harness.py --repo-root "$GITHUB_WORKSPACE" --mode check --module docs

      - name: Docs harness verify
        working-directory: .skills/harness/skills/docs-harness
        run: uv run python scripts/harness/docs/verify.py --repo-root "$GITHUB_WORKSPACE"
