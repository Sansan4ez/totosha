version: 1
resource_attributes:
  required:
  - service.name
signal_kinds:
  required:
  - traces
  - metrics
  - logs
correlation:
  required_log_fields:
  - trace_id
  - span_id
  - request_id
catalog:
  - name: platform.observability.baseline
    kind: log
    service: core
    emitter:
      path: docker-compose.yml
      description: Repository-level baseline marker used to keep the observability harness configured for future changes.
    consumers:
      - kind: baseline
        ref: docs/operations/observability-baseline.md
      - kind: policy
        ref: docs/operations/observability-policy.md
    coverage_paths:
      - path: harness/observability/signals.yaml
        contains:
          - platform.observability.baseline
  - name: http_server_duration_milliseconds
    kind: metric
    emitter:
      path: docs/operations/observability-baseline.md
      description: Shared HTTP request latency histogram exported by instrumented services and scraped by the OTEL collector.
    consumers:
      - kind: alert
        ref: OBS-ALERT-001
      - kind: smoke
        ref: victoriametrics/smoke_test.sh
      - kind: baseline
        ref: docs/operations/observability-baseline.md
    coverage_paths:
      - path: docs/operations/observability-baseline.md
        contains:
          - http_server_duration_milliseconds
      - path: victoriametrics/otel-collector-config.yml
        contains:
          - /metrics
      - path: core/observability.py
        contains:
          - http_server_duration_milliseconds
      - path: proxy/observability.py
        contains:
          - http_server_duration_milliseconds
  - name: HTTP request completed
    kind: log
    emitter:
      path: docs/operations/observability-baseline.md
      description: Shared request completion log line emitted by instrumented HTTP services with request_id, trace_id and span_id correlation.
    consumers:
      - kind: smoke
        ref: victoriametrics/smoke_test.sh
      - kind: runbook
        ref: docs/operations/observability-runbook.md
      - kind: policy
        ref: docs/operations/observability-policy.md
    coverage_paths:
      - path: docs/operations/observability-baseline.md
        contains:
          - HTTP request completed
          - request_id
          - trace_id
          - span_id
      - path: core/observability.py
        contains:
          - HTTP request completed
          - request_id
          - trace_id
          - span_id
      - path: proxy/observability.py
        contains:
          - HTTP request completed
  - name: api.request
    kind: trace
    emitter:
      path: docs/operations/observability-baseline.md
      description: Shared top-level request span created around inbound HTTP handling and propagated across internal service calls.
    consumers:
      - kind: smoke
        ref: victoriametrics/smoke_test.sh
      - kind: runbook
        ref: docs/operations/observability-runbook.md
    coverage_paths:
      - path: docs/operations/observability-baseline.md
        contains:
          - api.request
      - path: core/observability.py
        contains:
          - api.request
      - path: proxy/observability.py
        contains:
          - api.request
  - name: corp_db_search_duration_milliseconds
    kind: metric
    service: tools-api
    emitter:
      path: tools-api/src/routes/corp_db.py
      description: End-to-end latency histogram for corp_db_search kinds and profiles.
    consumers:
      - kind: dashboard
        ref: Harness Service Overview
      - kind: runbook
        ref: docs/operations/observability-runbook.md
    coverage_paths:
      - path: docs/operations/observability-baseline.md
        contains:
          - corp_db_search_duration_milliseconds
      - path: tools-api/src/routes/corp_db.py
        contains:
          - corp_db_search_duration_milliseconds
      - path: docs/operations/observability-runbook.md
        contains:
          - corp_db_search_duration_milliseconds
  - name: corp_db_search_phase_duration_milliseconds
    kind: metric
    service: tools-api
    emitter:
      path: tools-api/src/routes/corp_db.py
      description: Phase-level latency histogram for lamp_filters, hybrid_primary, embedding, token_fallback, alias_fallback, and merge.
    consumers:
      - kind: dashboard
        ref: Harness Service Overview
      - kind: runbook
        ref: docs/operations/observability-runbook.md
      - kind: smoke
        ref: tools-api/tests/test_corp_db.py
    coverage_paths:
      - path: docs/operations/observability-baseline.md
        contains:
          - corp_db_search_phase_duration_milliseconds
      - path: tools-api/src/routes/corp_db.py
        contains:
          - corp_db_search_phase_duration_milliseconds
          - lamp_filters
          - hybrid_primary
          - embedding
          - token_fallback
          - alias_fallback
          - merge
      - path: tools-api/tests/test_corp_db.py
        contains:
          - corp_db_search_phase_duration_milliseconds_bucket
      - path: docs/operations/observability-runbook.md
        contains:
          - corp_db_search_phase_duration_milliseconds_count
  - name: tool.corp_db_search
    kind: trace
    service: core
    emitter:
      path: core/tools/corp_db.py
      description: Core-side tool span around transport to tools-api for request-level triage.
    consumers:
      - kind: runbook
        ref: docs/operations/observability-runbook.md
    coverage_paths:
      - path: docs/operations/observability-baseline.md
        contains:
          - tool.corp_db_search
      - path: core/tools/corp_db.py
        contains:
          - tool.corp_db_search
      - path: docs/operations/observability-runbook.md
        contains:
          - tool.corp_db_search
  - name: corp_db.lamp_filters
    kind: trace
    service: tools-api
    emitter:
      path: tools-api/src/routes/corp_db.py
      description: Fast-path search span for authoritative lamp filter retrieval.
    consumers:
      - kind: runbook
        ref: docs/operations/observability-runbook.md
    coverage_paths:
      - path: tools-api/src/routes/corp_db.py
        contains:
          - _observe_search_phase
          - phase="lamp_filters"
      - path: docs/operations/observability-runbook.md
        contains:
          - corp_db.lamp_filters
  - name: corp_db.hybrid_primary
    kind: trace
    service: tools-api
    emitter:
      path: tools-api/src/routes/corp_db.py
      description: Primary lexical hybrid stage executed before semantic fallback.
    consumers:
      - kind: runbook
        ref: docs/operations/observability-runbook.md
    coverage_paths:
      - path: tools-api/src/routes/corp_db.py
        contains:
          - _observe_search_phase
          - phase="hybrid_primary"
      - path: docs/operations/observability-runbook.md
        contains:
          - corp_db.hybrid_primary
  - name: corp_db.embedding
    kind: trace
    service: tools-api
    emitter:
      path: tools-api/src/routes/corp_db.py
      description: Semantic embedding stage for late fallback in hybrid_search.
    consumers:
      - kind: runbook
        ref: docs/operations/observability-runbook.md
    coverage_paths:
      - path: tools-api/src/routes/corp_db.py
        contains:
          - _observe_search_phase
          - phase="embedding"
      - path: docs/operations/observability-runbook.md
        contains:
          - corp_db.embedding
  - name: corp_db.token_fallback
    kind: trace
    service: tools-api
    emitter:
      path: tools-api/src/routes/corp_db.py
      description: Token fallback span for degraded hybrid entity resolution.
    consumers:
      - kind: runbook
        ref: docs/operations/observability-runbook.md
    coverage_paths:
      - path: tools-api/src/routes/corp_db.py
        contains:
          - _observe_search_phase
          - phase="token_fallback"
      - path: docs/operations/observability-runbook.md
        contains:
          - corp_db.token_fallback
  - name: corp_db.alias_fallback
    kind: trace
    service: tools-api
    emitter:
      path: tools-api/src/routes/corp_db.py
      description: Alias fallback span used only for identifier-like token search.
    consumers:
      - kind: runbook
        ref: docs/operations/observability-runbook.md
    coverage_paths:
      - path: tools-api/src/routes/corp_db.py
        contains:
          - _observe_search_phase
          - phase="alias_fallback"
      - path: docs/operations/observability-runbook.md
        contains:
          - corp_db.alias_fallback
